<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Animaizinhos Encantados ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
font-family:'Roboto',sans-serif;
margin:0;
background:#fff0f5;
}

/* HEADER */

header{
background:linear-gradient(90deg,#ff6f61,#ff9472);
color:white;
text-align:center;
padding:2rem;
}

header h1{
font-family:'Pacifico',cursive;
font-size:3rem;
margin:0;
}

/* BOTAO CARRINHO */

.carrinho-btn{
position:fixed;
top:20px;
right:20px;
background:#ff6f61;
color:white;
border:none;
padding:12px 18px;
border-radius:20px;
cursor:pointer;
z-index:10;
}

/* AREA URSOS */

.ursos-area{
max-width:1100px;
margin:auto;
padding:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.price{
color:#ff6f61;
font-weight:bold;
}

.btn{
background:#ff6f61;
color:white;
border:none;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

/* CARRINHO */

.carrinho{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 15px rgba(0,0,0,0.2);
padding:15px;
transition:0.4s;
overflow:auto;
}

.carrinho.ativo{
right:0;
}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.remover{
background:red;
color:white;
border:none;
padding:4px 8px;
border-radius:5px;
cursor:pointer;
}

/* FORM */

.form-area{
max-width:500px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.form-area form{
display:grid;
gap:10px;
}

.form-area input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

footer{
text-align:center;
padding:20px;
background:#333;
color:white;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>🐻 Ursinhos Encantados</h1>
<p>Escolha seu ursinho favorito</p>
</header>

<button class="carrinho-btn" onclick="toggleCarrinho()">🛒 Carrinho</button>

<!-- PRODUTOS -->

<section class="ursos-area">

<h2>🧸 Ursos de Pelúcia</h2>

<div class="container" id="produtos">

<div class="card">
<img src="imagensgpt/ursogrande.png">
<div class="card-body">
<h3>Teddy Fofo</h3>
<p class="price">120</p>
<button class="btn" onclick="addCarrinho('Teddy Fofo',120)">Adicionar 🛒</button>
</div>
</div>

<div class="card">
<img src="imagensgpt/ursomarrom.png">
<div class="card-body">
<h3>Urso Marrom</h3>
<p class="price">150</p>
<button class="btn" onclick="addCarrinho('Urso Marrom',150)">Adicionar 🛒</button>
</div>
</div>

<div class="card">
<img src="imagensgpt/ursobranco.png">
<div class="card-body">
<h3>Ursinho Branco</h3>
<p class="price">180</p>
<button class="btn" onclick="addCarrinho('Ursinho Branco',180)">Adicionar 🛒</button>
</div>
</div>

</div>

</section>

<!-- CARRINHO -->

<div class="carrinho" id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="listaCarrinho"></div>

<p><b>Total: R$ <span id="total">0</span></b></p>

</div>

<!-- FORM -->

<section class="form-area">

<h2>➕ Adicionar Novo Urso</h2>

<form id="ursoForm">

<input type="text" id="nome" placeholder="Nome">

<input type="number" id="preco" placeholder="Preço">

<input type="text" id="imagem" placeholder="Link da imagem">

<button class="btn">Adicionar</button>

</form>

</section>

<footer>
© 2026 Ursinhos Encantados
</footer>

<script>

/* CARRINHO */

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || []

function salvarCarrinho(){
localStorage.setItem("carrinho", JSON.stringify(carrinho))
}

function atualizarCarrinho(){

let lista = document.getElementById("listaCarrinho")
lista.innerHTML=""

let total = 0

carrinho.forEach((item,index)=>{

let div = document.createElement("div")
div.classList.add("item")

div.innerHTML=`
${item.nome} - R$${item.preco}
<button class="remover" onclick="removerItem(${index})">X</button>
`

lista.appendChild(div)

total += item.preco

})

document.getElementById("total").innerText = total

}

function addCarrinho(nome,preco){

carrinho.push({nome,preco})

salvarCarrinho()

atualizarCarrinho()

}

function removerItem(index){

carrinho.splice(index,1)

salvarCarrinho()

atualizarCarrinho()

}

/* ABRIR FECHAR */

function toggleCarrinho(){

document.getElementById("carrinho").classList.toggle("ativo")

}

/* NOVO URSO */

document.getElementById("ursoForm").addEventListener("submit",function(e){

e.preventDefault()

let nome = document.getElementById("nome").value
let preco = parseFloat(document.getElementById("preco").value)
let imagem = document.getElementById("imagem").value

let card = document.createElement("div")
card.classList.add("card")

card.innerHTML=`

<img src="${imagem}">

<div class="card-body">

<h3>${nome}</h3>

<p class="price">${preco}</p>

<button class="btn" onclick="addCarrinho('${nome}',${preco})">Adicionar 🛒</button>

</div>

`

document.getElementById("produtos").appendChild(card)

document.getElementById("ursoForm").reset()

})

atualizarCarrinho()

</script>

</body>
</html>
