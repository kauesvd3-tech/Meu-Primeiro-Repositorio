<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portfólio Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #111;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        nav ul {
            list-style: none;
            margin-top: 10px;
        }

        nav ul li {
            display: inline;
            margin: 0 10px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        .hero {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 100px 0;
            text-align: center;
        }

        .input-area {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 200px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #fff;
            color: #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        section {
            padding: 60px 0;
            text-align: center;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1 id="logoNome">SeuNome</h1>
</header>

<section class="hero">
    <h2>Olá, eu sou <span id="nomeHero">Seu Nome</span> 👋</h2>
    <p>Desenvolvedor Front-End</p>

    <div class="input-area">
        <input type="text" id="inputNome" placeholder="Digite seu nome">
        <button onclick="salvarNome()">Salvar Nome</button>
    </div>
</section>

<section>
    <h2>Sobre Mim</h2>
    <p>Sou apaixonado por tecnologia e desenvolvimento web.</p>
</section>

<footer>
    <p>© 2026 <span id="nomeFooter">Seu Nome</span> - Todos os direitos reservados</p>
</footer>

<script>
    // Quando o site abrir
    window.onload = function() {
        var nomeSalvo = localStorage.getItem("nomePortfolio");

        if(nomeSalvo) {
            atualizarNomeNaTela(nomeSalvo);
        }
    };

    function salvarNome() {
        var nome = document.getElementById("inputNome").value;

        if(nome.trim() !== "") {
            localStorage.setItem("nomePortfolio", nome);
            atualizarNomeNaTela(nome);
        }
    }

    function atualizarNomeNaTela(nome) {
        document.getElementById("logoNome").innerText = nome;
        document.getElementById("nomeHero").innerText = nome;
        document.getElementById("nomeFooter").innerText = nome;
    }
</script>

</body>
</html>
