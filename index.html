<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Portfólio Profissional</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #f4f4f4;
            color: #333;
        }

        header {
            background: #111;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        .hero {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }

        .input-area {
            margin-top: 20px;
        }

        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 200px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #fff;
            color: #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #333;
            color: white;
        }

        section {
            padding: 60px 20px;
            text-align: center;
        }

        footer {
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1 id="logoNome">SeuNome</h1>
</header>

<section class="hero">
    <h2>Olá, eu sou <span id="nomeHero">Seu Nome</span> 👋</h2>
    <p>Desenvolvedor Front-End</p>

    <div class="input-area">
        <input type="text" id="inputNome" placeholder="Digite seu nome">
        <button id="btnSalvar">Salvar Nome</button>
    </div>
</section>

<section>
    <h2>Sobre Mim</h2>
    <p>Sou apaixonado por tecnologia e desenvolvimento web.</p>
</section>

<footer>
    <p>© 2026 <span id="nomeFooter">Seu Nome</span> - Todos os direitos reservados</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function() {

        const input = document.getElementById("inputNome");
        const btn = document.getElementById("btnSalvar");

        const nomeSalvo = localStorage.getItem("nomePortfolio");

        if (nomeSalvo) {
            atualizarNomeNaTela(nomeSalvo);
            input.value = nomeSalvo;
        }

        btn.addEventListener("click", salvarNome);

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                salvarNome();
            }
        });

        function salvarNome() {
            const nome = input.value.trim();

            if (nome !== "") {
                localStorage.setItem("nomePortfolio", nome);
                atualizarNomeNaTela(nome);
            }
        }

        function atualizarNomeNaTela(nome) {
            document.getElementById("logoNome").textContent = nome;
            document.getElementById("nomeHero").textContent = nome;
            document.getElementById("nomeFooter").textContent = nome;
        }

    });
</script>

</body>
</html>
